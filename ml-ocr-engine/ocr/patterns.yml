# Configuration des expressions régulières
extractions:
  document_id:
    pattern: "(?:R.f.rence|N° devis) : ([0-z-]+)\n"
    description: "Capture l'id du document"

  document_type:
    pattern: "(?i)(ATTESTATION|DEVIS CLIENT|DEVIS FOURNISSEUR)"
    description: "Capture le type de document"
  
  siret:
    pattern: "SIRET : ([0-9]+)\n"
    description: "Capture les 14 chiffres du SIRET avec ou sans espaces"
  
  date_emission:
    pattern: "Date d'.mission : (.?./.?./.?.?..)"
    description: "Capture la date d'emission"
  
  date_expiration:
    pattern: "Date (?:d'expiration|de validité) : (.?./.?./.?.?..)"
    description: "Capture la date d'emission"
  
  montant_tva:
    pattern: "TVA : ([0-z]+)\n"
    description: "Capture le montant après la mention TVA"

  nom:
    pattern: "(?:Nom : |Entreprise\n\n)(.*)\n"
    description: "Capture le nom"
  
  adresse:
    pattern: "Adresse : (.*)\n"
    description: "Capture l'adresse"